services:
  - type: web
    name: trail-scout-api
    env: node
    plan: free
    buildCommand: cd backend && npm install --production
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: VOCAL_BRIDGE_API_URL
        value: https://api.vocalbridgeai.com
