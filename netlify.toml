# Netlify Configuration for Trail Scout

[build]
  # Directory that contains the deploy-ready HTML files and assets generated by the build process
  publish = "frontend/build"
  # Directory to change to before starting build. This is parent directory of both frontend and backend if applicable
  base = "."
  # Actual commands to run on each build
  command = "cd frontend && npm install && npm run build"

[dev]
  # Directory to server locally during development
  publish = "frontend/build"
  # Port number to use during local development
  port = 3000
  # Special processing rules
  functions = "netlify/functions"

# Environment variables
[build.environment]
  NODE_VERSION = "18"
  CI = "true"

# Redirects for SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "max-age=3600"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "max-age=31536000"
    # Public access
    "Access-Control-Allow-Origin" = "*"
